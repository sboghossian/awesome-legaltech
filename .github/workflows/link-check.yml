name: Link Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore lychee cache
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: cache-lychee-${{ github.sha }}
          restore-keys: cache-lychee-

      - name: Check links
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: >
            --verbose
            --no-progress
            --cache
            --max-cache-age 1d
            --accept 200,206,202,401,403,429
            --exclude-loopback
            --exclude 'mailto:'
            --exclude 'localhost'
            --exclude 'pacer.uscourts.gov'
            --exclude 'indiankanoon.org'
            --exclude 'scdb.wustl.edu'
            --exclude 'legalweek.com'
            --exclude 'law.com'
            --exclude 'pro.bloomberglaw.com'
            --exclude 'capterra.com'
            --exclude 'g2.com'
            --exclude 'softwareadvice.com'
            --exclude 'getapp.com'
            --exclude 'lexisnexis.com'
            --exclude 'westlaw.com'
            --exclude 'store.law.com'
            --exclude 'nevo.co.il'
            --exclude 'portal.stf.jus.br'
            --exclude 'law.pku.edu.cn'
            --exclude 'glaw.scourt.go.kr'
            --exclude 'manupatra.com'
            --exclude 'free.law'
            --exclude 'clio.com'
            --exclude 'drata.com'
            --exclude 'main.knesset.gov.il'
            --timeout 30
            --max-retries 3
            README.md
          fail: ${{ github.event_name != 'schedule' }}
          output: ./lychee-report.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create issue from scheduled run
        if: github.event_name == 'schedule' && steps.lychee.outputs.exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: 'Link Check Report - broken links found'
          content-filepath: ./lychee-report.md
          labels: |
            broken link
            maintenance
